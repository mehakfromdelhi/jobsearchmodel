name: Bug Report
description: Report a bug in Mehak's Job Search Model
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
  - type: markdown
    attributes:
      value: |
        ---
        Thanks for helping improve Mehak's Job Search Model. Please include enough detail for a fresh-clone reproduction when possible.
